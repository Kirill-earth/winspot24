services:
  api:
    container_name: winspot24-api
    build:
      context: ../../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./.env
    volumes:
      - ../../backend/data:/app/data
    expose:
      - "8000"

  caddy:
    image: caddy:2.8-alpine
    container_name: winspot24-api-caddy
    restart: unless-stopped
    depends_on:
      - api
    env_file:
      - ./.env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
