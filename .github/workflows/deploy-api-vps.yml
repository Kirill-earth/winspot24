name: Deploy API To VPS

on:
  push:
    branches:
      - main
    paths:
      - index.html
      - account.html
      - styles.css
      - app.js
      - config.js
      - terms.html
      - privacy.html
      - refund.html
      - eligibility.html
      - backend/**
      - deploy/api/**
      - .github/workflows/deploy-api-vps.yml
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VPS_HOST: ${{ vars.VPS_HOST }}
      VPS_USER: ${{ vars.VPS_USER }}
      VPS_PORT: ${{ vars.VPS_PORT }}
      VPS_PATH: ${{ vars.VPS_PATH }}
      API_DOMAIN: ${{ vars.API_DOMAIN }}
      ACME_EMAIL: ${{ vars.ACME_EMAIL }}
      APP_URL: ${{ vars.APP_URL }}
      SESSION_COOKIE_NAME: ${{ vars.SESSION_COOKIE_NAME }}
      SESSION_COOKIE_SECURE: ${{ vars.SESSION_COOKIE_SECURE }}
      SESSION_DAYS: ${{ vars.SESSION_DAYS }}
      SMTP_HOST: ${{ vars.SMTP_HOST }}
      SMTP_PORT: ${{ vars.SMTP_PORT }}
      SMTP_SENDER_EMAIL: ${{ vars.SMTP_SENDER_EMAIL }}
      SMTP_SENDER_NAME: ${{ vars.SMTP_SENDER_NAME }}
      SMTP_STARTTLS: ${{ vars.SMTP_STARTTLS }}
      SMTP_USE_SSL: ${{ vars.SMTP_USE_SSL }}
      MAGIC_LINK_TTL_MINUTES: ${{ vars.MAGIC_LINK_TTL_MINUTES }}
      EMAIL_AUTH_ENABLED: ${{ vars.EMAIL_AUTH_ENABLED }}
      GOOGLE_CLIENT_ID: ${{ vars.GOOGLE_CLIENT_ID }}
      APPLE_SERVICE_ID: ${{ vars.APPLE_SERVICE_ID }}
      APPLE_REDIRECT_URI: ${{ vars.APPLE_REDIRECT_URI }}
      ETH_RPC_URL: ${{ secrets.ETH_RPC_URL }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required configuration
        run: |
          set -euo pipefail
          : "${VPS_HOST:?Missing repository variable VPS_HOST}"
          : "${ETH_RPC_URL:?Missing repository secret ETH_RPC_URL}"

          if [[ -z "${VPS_PORT}" ]]; then
            echo "VPS_PORT=22" >> "$GITHUB_ENV"
          fi
          if [[ -z "${VPS_PATH}" ]]; then
            echo "VPS_PATH=/opt/winspot24-api" >> "$GITHUB_ENV"
          fi
          if [[ -z "${VPS_USER}" ]]; then
            echo "VPS_USER=root" >> "$GITHUB_ENV"
          fi
          if [[ -z "${API_DOMAIN}" ]]; then
            echo "API_DOMAIN=api.winspot24.com" >> "$GITHUB_ENV"
          fi
          if [[ -z "${ACME_EMAIL}" ]]; then
            echo "ACME_EMAIL=admin@winspot24.com" >> "$GITHUB_ENV"
          fi
          if [[ -z "${APP_URL}" ]]; then
            echo "APP_URL=https://winspot24.com" >> "$GITHUB_ENV"
          fi
          if [[ -z "${SESSION_COOKIE_NAME}" ]]; then
            echo "SESSION_COOKIE_NAME=winspot24_session" >> "$GITHUB_ENV"
          fi
          if [[ -z "${SESSION_COOKIE_SECURE}" ]]; then
            echo "SESSION_COOKIE_SECURE=true" >> "$GITHUB_ENV"
          fi
          if [[ -z "${SESSION_DAYS}" ]]; then
            echo "SESSION_DAYS=30" >> "$GITHUB_ENV"
          fi
          if [[ -z "${SMTP_PORT}" ]]; then
            echo "SMTP_PORT=587" >> "$GITHUB_ENV"
          fi
          if [[ -z "${SMTP_SENDER_NAME}" ]]; then
            echo "SMTP_SENDER_NAME=Winspot24" >> "$GITHUB_ENV"
          fi
          if [[ -z "${SMTP_STARTTLS}" ]]; then
            echo "SMTP_STARTTLS=true" >> "$GITHUB_ENV"
          fi
          if [[ -z "${SMTP_USE_SSL}" ]]; then
            echo "SMTP_USE_SSL=false" >> "$GITHUB_ENV"
          fi
          if [[ -z "${MAGIC_LINK_TTL_MINUTES}" ]]; then
            echo "MAGIC_LINK_TTL_MINUTES=20" >> "$GITHUB_ENV"
          fi
          if [[ -z "${EMAIL_AUTH_ENABLED}" ]]; then
            echo "EMAIL_AUTH_ENABLED=false" >> "$GITHUB_ENV"
          fi
          if [[ -z "${APPLE_REDIRECT_URI}" ]]; then
            echo "APPLE_REDIRECT_URI=https://${API_DOMAIN}/api/v1/auth/apple/callback" >> "$GITHUB_ENV"
          fi

      - name: Prepare API env file
        run: |
          set -euo pipefail
          mkdir -p deploy/api
          cat > deploy/api/.env <<EOF
          ETH_RPC_URL=${ETH_RPC_URL}
          CHAIN_ID=1
          USDT_CONTRACT_ADDRESS=0xdAC17F958D2ee523a2206206994597C13D831ec7
          TREASURY_ADDRESS=0xC5AbC4ffE1d53d480dcadcdc4d2ccb66Fe96C47a
          TOTAL_TICKETS=100
          MAX_TICKETS_PER_PURCHASE=20
          TICKET_PRICE_USDT=10
          SOLD_OUT_DELAY_BLOCKS=5
          SHIPPING_START_DATE=2026-03-11
          CORS_ORIGINS=https://winspot24.com,https://www.winspot24.com
          DB_PATH=/app/data/winspot24.db
          APP_URL=${APP_URL}
          SESSION_COOKIE_NAME=${SESSION_COOKIE_NAME}
          SESSION_COOKIE_SECURE=${SESSION_COOKIE_SECURE}
          SESSION_DAYS=${SESSION_DAYS}
          SMTP_HOST=${SMTP_HOST}
          SMTP_PORT=${SMTP_PORT}
          SMTP_USERNAME=${SMTP_USERNAME}
          SMTP_PASSWORD=${SMTP_PASSWORD}
          SMTP_SENDER_EMAIL=${SMTP_SENDER_EMAIL}
          SMTP_SENDER_NAME=${SMTP_SENDER_NAME}
          SMTP_STARTTLS=${SMTP_STARTTLS}
          SMTP_USE_SSL=${SMTP_USE_SSL}
          MAGIC_LINK_TTL_MINUTES=${MAGIC_LINK_TTL_MINUTES}
          EMAIL_AUTH_ENABLED=${EMAIL_AUTH_ENABLED}
          GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
          APPLE_SERVICE_ID=${APPLE_SERVICE_ID}
          APPLE_REDIRECT_URI=${APPLE_REDIRECT_URI}
          API_DOMAIN=${API_DOMAIN}
          ACME_EMAIL=${ACME_EMAIL}
          EOF

      - name: Prepare static site bundle
        run: |
          set -euo pipefail
          mkdir -p deploy/site/public
          cp index.html account.html styles.css app.js config.js terms.html privacy.html refund.html eligibility.html deploy/site/public/

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Upload app files
        run: |
          set -euo pipefail
          RSYNC_SSH="ssh -p ${VPS_PORT} -o StrictHostKeyChecking=accept-new -o ConnectTimeout=20"
          rsync -az --delete \
            --exclude 'backend/data/' \
            --exclude 'backend/data/**' \
            -e "${RSYNC_SSH}" \
            backend deploy \
            "${VPS_USER}@${VPS_HOST}:${VPS_PATH}/"

      - name: Deploy on VPS
        run: |
          set -euo pipefail
          ssh -p "${VPS_PORT}" -o StrictHostKeyChecking=accept-new -o ConnectTimeout=20 "${VPS_USER}@${VPS_HOST}" "VPS_PATH='${VPS_PATH}' bash -s" <<'EOF'
          set -euo pipefail
          if [[ "$(id -u)" -eq 0 ]]; then
            SUDO=""
          else
            if ! command -v sudo >/dev/null 2>&1; then
              echo "User is not root and sudo is not installed." >&2
              exit 1
            fi
            SUDO="sudo"
          fi

          if ! command -v docker >/dev/null 2>&1; then
            if command -v apt-get >/dev/null 2>&1; then
              $SUDO apt-get update
              $SUDO apt-get install -y docker.io docker-compose-plugin
            else
              echo "Docker is missing and automatic install supports apt-get only." >&2
              exit 1
            fi
          fi

          if command -v systemctl >/dev/null 2>&1; then
            $SUDO systemctl enable --now docker || true
          fi

          cd "${VPS_PATH}/deploy/api"
          mkdir -p ../../backend/data
          $SUDO docker compose down --remove-orphans >/dev/null 2>&1 || true
          $SUDO docker rm -f winspot24-api winspot24-api-caddy >/dev/null 2>&1 || true
          $SUDO docker compose up -d --build --remove-orphans --force-recreate
          $SUDO docker compose ps
          EOF
